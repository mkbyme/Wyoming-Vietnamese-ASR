name: Release & Docker Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create release archive
        run: |
          cd custom_components
          zip -r ../wyoming_vietnamese.zip .
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: wyoming_vietnamese.zip
          generate_release_notes: true
          draft: false
          prerelease: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: |
            gnolnos/wyoming-vietnamese-asr:${{ github.ref_name }}
            gnolnos/wyoming-vietnamese-asr:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build FastAPI variant
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile.fastapi
          push: true
          tags: |
            gnolnos/wyoming-vietnamese-asr:${{ github.ref_name }}-fastapi
            gnolnos/wyoming-vietnamese-asr:fastapi
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
