name: Release & Docker Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'docker/**'
      - 'wyoming-vietnamese-asr/**'
      - 'repository.yaml'

jobs:
  # Build main application image (for standalone Docker use)
  build-app:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    strategy:
      matrix:
        arch: [amd64, arm64]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get platform
        id: platform
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wyoming-vietnamese-asr:latest
            ghcr.io/${{ github.repository_owner }}/wyoming-vietnamese-asr:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/wyoming-vietnamese-asr:${{ matrix.arch }}
          platforms: ${{ steps.platform.outputs.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
