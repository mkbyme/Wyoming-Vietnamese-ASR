name: Build HA Add-on

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'wyoming-vietnamese-asr/**'
      - 'repository.json'

jobs:
  build-addon:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    strategy:
      matrix:
        arch: [aarch64, amd64, armhf, armv7, i386]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get base image
        id: base
        run: |
          ARCH=${{ matrix.arch }}
          case $ARCH in
            aarch64) BASE="ghcr.io/home-assistant/aarch64-base-python:3.13-alpine3.21" ;;
            amd64) BASE="ghcr.io/home-assistant/amd64-base-python:3.13-alpine3.21" ;;
            armhf) BASE="ghcr.io/home-assistant/armhf-base-python:3.13-alpine3.21" ;;
            armv7) BASE="ghcr.io/home-assistant/armv7-base-python:3.13-alpine3.21" ;;
            i386) BASE="ghcr.io/home-assistant/i386-base-python:3.13-alpine3.21" ;;
          esac
          echo "base=$BASE" >> $GITHUB_OUTPUT
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./wyoming-vietnamese-asr
          file: ./wyoming-vietnamese-asr/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wyoming-vietnamese-asr-addon-${{ matrix.arch }}:latest
            ghcr.io/${{ github.repository_owner }}/wyoming-vietnamese-asr-addon-${{ matrix.arch }}:${{ github.ref_name }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.base }}
          platforms: |
            ${{ matrix.arch == 'aarch64' && 'linux/arm64' || '' }}
            ${{ matrix.arch == 'amd64' && 'linux/amd64' || '' }}
            ${{ matrix.arch == 'armhf' && 'linux/arm/v6' || '' }}
            ${{ matrix.arch == 'armv7' && 'linux/arm/v7' || '' }}
            ${{ matrix.arch == 'i386' && 'linux/386' || '' }}
