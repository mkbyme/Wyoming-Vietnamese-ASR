# Wyoming Vietnamese ASR - Standalone Docker Deployment
# This is for running outside of Home Assistant (standalone mode)

version: '3.8'

services:
  wyoming-vietnamese-asr:
    image: gnolnos/wyoming-vietnamese-asr:latest
    container_name: wyoming-vietnamese-asr
    ports:
      - "10400:10400"  # Wyoming protocol
      - "8090:8090"    # FastAPI (optional, for Xiaozhi)
    environment:
      - TZ=Asia/Saigon
      - MODEL_PATH=/app/model
      - LOG_LEVEL=INFO
    volumes:
      - ./model:/app/model:ro
      - ./config:/app/config
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri  # Optional: GPU acceleration
    deploy:
      resources:
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]  # Optional: NVIDIA GPU

  # Optional: FastAPI server for REST API (Xiaozhi integration)
  wyoming-fastapi:
    image: gnolnos/wyoming-vietnamese-asr:fastapi
    container_name: wyoming-fastapi
    ports:
      - "8091:8090"
    environment:
      - TZ=Asia/Saigon
      - MODEL_PATH=/app/model
      - LOG_LEVEL=INFO
    volumes:
      - ./model:/app/model:ro
      - ./config:/app/config
    restart: unless-stopped
    depends_on:
      - wyoming-vietnamese-asr

# Network setup
networks:
  default:
    name: wyoming-network
    driver: bridge
